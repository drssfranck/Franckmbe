<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.8" />
    </linearGradient>
    <radialGradient id="circleGradient">
      <stop offset="0%" style="stop-color:#e8eaf0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8ddf0;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- Profile Circle Background -->
  <circle cx="200" cy="160" r="90" fill="url(#circleGradient)"/>
  
  <!-- Head -->
  <circle cx="200" cy="140" r="55" fill="#f5deb3" stroke="#e0c9a0" stroke-width="2"/>
  
  <!-- Hair -->
  <path d="M 145 140 Q 145 90 200 85 Q 255 90 255 140 L 255 145 Q 255 100 200 95 Q 145 100 145 145 Z" fill="#2c2416"/>
  
  <!-- Eyes -->
  <circle cx="180" cy="130" r="5" fill="#1f2937"/>
  <circle cx="220" cy="130" r="5" fill="#1f2937"/>
  <circle cx="181" cy="129" r="2" fill="white"/>
  <circle cx="221" cy="129" r="2" fill="white"/>
  
  <!-- Nose -->
  <path d="M 200 130 L 200 150" stroke="#d4a574" stroke-width="2" fill="none"/>
  
  <!-- Smile -->
  <path d="M 185 155 Q 200 165 215 155" stroke="#c9956f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Neck -->
  <rect x="185" y="195" width="30" height="25" fill="#f5deb3"/>
  
  <!-- Shirt/Body -->
  <ellipse cx="200" cy="250" rx="75" ry="80" fill="#1e3a5f"/>
  
  <!-- Shoulders highlight -->
  <path d="M 130 240 Q 200 220 270 240" stroke="rgba(255,255,255,0.1)" stroke-width="3" fill="none"/>
  
  <!-- Decorative elements -->
  <circle cx="310" cy="50" r="30" fill="rgba(255,255,255,0.1)"/>
  <circle cx="80" cy="320" r="25" fill="rgba(255,255,255,0.08)"/>
</svg>